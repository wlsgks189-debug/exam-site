<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1:1 문의 답변 — 짱구's Desk</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d1117">
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="common.js"></script>
</head>
<body>
<div id="main-section" style="display:none">
  <div class="container">
    <div class="section-title">1:1 문의 답변</div>
    <div class="section-sub">자격증 선택 후 날짜 입력 → 복사해서 사용하세요</div>

    <div class="form-group">
      <label>자격증 선택</label>
      <select id="cert-filter" onchange="updateComplaintPreview()">
        <option value="PC정비사">PC정비사</option>
        <option value="네트워크관리사">네트워크관리사</option>
        <option value="지능형홈관리사">지능형홈관리사</option>
        <option value="영상정보관리사">영상정보관리사</option>
        <option value="기타">기타 문의</option>
      </select>
    </div>

    <div class="card">
      <h2>📋 이의신청 안내</h2>
      <div class="form-row" style="flex-wrap:wrap">
        <div class="form-group" style="flex:1;min-width:calc(50% - .3rem)">
          <label>이의신청 시작일</label>
          <input type="text" id="complaint-date" placeholder="예: 3월 18일(수)" oninput="updateComplaintPreview()">
        </div>
        <div class="form-group" style="flex:1;min-width:calc(50% - .3rem)">
          <label>접수 기간 (일)</label>
          <input type="text" id="complaint-period" placeholder="예: 3" oninput="updateComplaintPreview()">
        </div>
      </div>
      <div style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:1rem;font-size:.84rem;line-height:1.9;white-space:pre-wrap;color:var(--text);margin-bottom:.8rem;" id="complaint-preview">자격증을 선택하고 날짜를 입력하세요</div>
      <button class="btn btn-copy" style="width:100%;justify-content:center;" onclick="copyComplaint()">📋 복사</button>
    </div>
  </div>
</div>

<script>
window.addEventListener('DOMContentLoaded', () => {
  initPage(() => {
    updateComplaintPreview();
  });
});

function updateComplaintPreview() {
  const cert = document.getElementById('cert-filter')?.value || 'PC정비사';
  const date = document.getElementById('complaint-date')?.value || '{시작일}';
  const period = document.getElementById('complaint-period')?.value || '{기간}';
  const preview = document.getElementById('complaint-preview');
  if (!preview) return;
  const certText = cert === '기타' ? '' : cert + ' ';
  preview.textContent =
    '안녕하세요, 한국정보통신자격협회입니다.\n\n' +
    '틀린 문제 확인 또는 ' + certText + '문제에 대한 이의신청은 ' + date + '부터 ' + period + '일간 접수받고 있습니다.\n\n' +
    '홈페이지 [고객지원] - [이의신청] 게시판을 통해 접수해 주시면, 이의신청 기간 종료 후 순차적으로 처리해 드리겠습니다.\n\n' +
    '감사합니다.';
}

function copyComplaint() {
  const text = document.getElementById('complaint-preview')?.textContent;
  if (text && text !== '자격증을 선택하고 날짜를 입력하세요') {
    navigator.clipboard.writeText(text).then(() => showToast('✅ 복사됐어요!'));
  } else {
    showToast('⚠️ 날짜를 먼저 입력해주세요');
  }
}
</script>
</body>
</html>
