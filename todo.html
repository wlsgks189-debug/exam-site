<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>할일 — 짱구's Desk</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d1117">
<link rel="manifest" href="manifest.json">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="common.js"></script>
<style>
.todo-item{display:flex;align-items:flex-start;gap:.8rem;padding:.75rem .85rem;background:var(--surface2);border:1px solid var(--border);border-radius:8px;margin-bottom:.5rem;transition:all .2s;}
.todo-item.done{opacity:.5;}
.todo-item.done .todo-text{text-decoration:line-through;color:var(--text-muted);}
.todo-check{width:18px;height:18px;accent-color:var(--success);cursor:pointer;flex-shrink:0;margin-top:2px;}
.todo-text{flex:1;font-size:.88rem;line-height:1.5;}
.history-month{margin-bottom:.8rem;border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.history-month-title{display:flex;align-items:center;gap:.5rem;padding:.75rem 1rem;background:var(--surface2);cursor:pointer;font-size:.88rem;font-weight:600;}
.history-month-title:hover{background:var(--border);}
.history-count{margin-left:auto;font-size:.75rem;color:var(--accent);font-weight:400;}
.history-arrow{font-size:.75rem;color:var(--text-muted);}
.history-month-body{padding:.5rem;}
.history-day{margin-bottom:.5rem;}
.history-day-title{font-size:.8rem;font-weight:600;color:var(--accent2);padding:.4rem .5rem;margin-bottom:.3rem;}
.history-item{display:flex;align-items:center;gap:.6rem;padding:.4rem .5rem;border-radius:6px;font-size:.82rem;}
.history-item:hover{background:var(--surface2);}
.history-text{flex:1;color:var(--text-muted);}
.history-time{font-size:.7rem;color:var(--text-muted);flex-shrink:0;}
.gcal-item{display:flex;flex-direction:column;gap:.2rem;padding:.7rem .8rem;background:var(--surface2);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:8px;margin-bottom:.5rem;}
.gcal-time{font-size:.75rem;color:var(--accent);font-weight:600;}
.gcal-title{font-size:.88rem;font-weight:500;}
.gcal-desc{font-size:.75rem;color:var(--text-muted);margin-top:.2rem;}
/* 편집 모달 */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:center;justify-content:center;padding:1rem;}
.modal-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:1.5rem;width:100%;max-width:480px;}
</style>
</head>
<body>

<!-- 편집 모달 -->
<div id="edit-modal" class="modal-overlay" style="display:none">
  <div class="modal-box">
    <h2 style="font-size:1.1rem;margin-bottom:1.2rem">✏️ 할일 편집</h2>
    <input type="hidden" id="edit-todo-id">
    <div class="form-group">
      <label>할일 내용</label>
      <textarea id="edit-todo-text" style="min-height:60px;resize:none;" oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
    </div>
    <div class="form-row" style="flex-wrap:wrap">
      <div class="form-group" style="flex:1;min-width:calc(50% - .3rem)">
        <label>시작 시간</label>
        <select id="edit-todo-start"><option value="">선택</option></select>
      </div>
      <div class="form-group" style="flex:1;min-width:calc(50% - .3rem)">
        <label>종료 시간</label>
        <select id="edit-todo-end"><option value="">선택</option></select>
      </div>
    </div>
    <div class="form-group">
      <label>우선순위</label>
      <select id="edit-todo-priority">
        <option value="high">🔴 높음</option>
        <option value="medium">🟡 보통</option>
        <option value="low">🟢 낮음</option>
      </select>
    </div>
    <div style="display:flex;gap:.7rem;margin-top:.5rem">
      <button class="btn btn-primary" style="flex:1" onclick="saveTodoEdit()">저장</button>
      <button class="btn btn-outline" style="flex:1;margin:0" onclick="closeEditModal()">취소</button>
    </div>
  </div>
</div>

<script>
const PRIORITY = {
  high:   { label:'🔴 높음', color:'var(--danger)',  bg:'#f05e5e18' },
  medium: { label:'🟡 보통', color:'var(--warning)', bg:'#f0a04018' },
  low:    { label:'🟢 낮음', color:'var(--success)', bg:'#4caf8a18' },
};

window.addEventListener('load', () => {
  initAuth(() => {
    initTodo();
    requestPush();
  });
});

async function initTodo(){
  const today=new Date();
  const dateEl=document.getElementById('todo-date');
  if(dateEl&&!dateEl.value) dateEl.value=`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
  initTimeSelects('todo-start','todo-end');
  await loadTodos();
  await loadHistory();
  loadGcal();
}

function initTimeSelects(startId,endId){
  const start=document.getElementById(startId), end=document.getElementById(endId);
  if(!start||start.options.length>1) return;
  for(let h=9;h<=18;h++){
    for(let m of['00','30']){
      if(h===18&&m==='30') break;
      const val=`${String(h).padStart(2,'0')}:${m}`;
      start.innerHTML+=`<option value="${val}">${val}</option>`;
      end.innerHTML+=`<option value="${val}">${val}</option>`;
    }
  }
}

async function loadTodos(){
  const dateVal=document.getElementById('todo-date')?.value; if(!dateVal) return;
  const[y,m,d]=dateVal.split('-');
  const days=['일','월','화','수','목','금','토'];
  const dow=days[new Date(dateVal).getDay()];
  document.getElementById('todo-date-label').textContent=`${y}년 ${m}월 ${d}일 (${dow}) 할일`;
  const{data}=await sb.from('todos').select('*').eq('user_id',currentUser.id).eq('date',dateVal).order('start_time',{ascending:true,nullsFirst:false}).order('created_at',{ascending:true});
  const el=document.getElementById('todo-list');
  if(!data||!data.length){el.innerHTML='<div class="empty">할일이 없습니다</div>';document.getElementById('todo-stats').textContent='';return;}
  const done=data.filter(t=>t.done).length;
  document.getElementById('todo-stats').textContent=`${done}/${data.length} 완료`;
  const order={high:0,medium:1,low:2};
  const sorted=[...data].sort((a,b)=>{
    const pa=order[a.priority||'medium'],pb=order[b.priority||'medium'];
    if(pa!==pb) return pa-pb;
    if(a.start_time&&b.start_time) return a.start_time.localeCompare(b.start_time);
    return 0;
  });
  el.innerHTML=sorted.map(t=>{
    const p=PRIORITY[t.priority||'medium'];
    const timeStr=t.start_time?`${t.start_time}${t.end_time?' ~ '+t.end_time:''}` :'';
    return `<div class="todo-item ${t.done?'done':''}" style="border-left:3px solid ${p.color}">
      <input type="checkbox" class="todo-check" ${t.done?'checked':''} onchange="toggleTodo('${t.id}',this.checked)">
      <div style="flex:1;min-width:0">
        <div class="todo-text">${t.text}</div>
        <div style="display:flex;gap:.5rem;margin-top:3px;flex-wrap:wrap">
          <span style="font-size:.7rem;color:${p.color}">${p.label}</span>
          ${timeStr?`<span style="font-size:.7rem;color:var(--text-muted)">⏰ ${timeStr}</span>`:''}
          ${t.done?`<span style="font-size:.7rem;color:var(--text-muted)">✅ ${formatDoneTime(t.done_at)}</span>`:''}
        </div>
      </div>
      <div style="display:flex;gap:.3rem">
        <button class="btn btn-outline btn-sm" onclick="editTodo('${t.id}')" style="padding:.2rem .4rem">✏️</button>
        <button class="btn btn-danger btn-sm" onclick="deleteTodo('${t.id}')" style="padding:.2rem .4rem">🗑</button>
      </div>
    </div>`;
  }).join('');
}

async function addTodo(){
  const input=document.getElementById('todo-input');
  const dateVal=document.getElementById('todo-date').value;
  const text=input.value.trim();
  const priority=document.getElementById('todo-priority').value;
  const start_time=document.getElementById('todo-start').value||null;
  const end_time=document.getElementById('todo-end').value||null;
  if(!text||!dateVal) return;
  const{error}=await sb.from('todos').insert({user_id:currentUser.id,text,date:dateVal,priority,start_time,end_time,done:false});
  if(!error){input.value='';input.style.height='auto';document.getElementById('todo-start').value='';document.getElementById('todo-end').value='';document.getElementById('todo-priority').value='medium';await loadTodos();showToast('✅ 할일 추가됐어요!');}
}

async function toggleTodo(id,done){
  await sb.from('todos').update({done,done_at:done?new Date().toISOString():null}).eq('id',id);
  await loadTodos(); await loadHistory();
  if(done) showToast('🎉 완료! 히스토리에 기록됐어요');
}

async function deleteTodo(id){
  if(!confirm('할일을 삭제할까요?')) return;
  await sb.from('todos').delete().eq('id',id);
  await loadTodos();
}

async function editTodo(id){
  const{data}=await sb.from('todos').select('*').eq('id',id).single();
  if(!data) return;
  document.getElementById('edit-todo-id').value=data.id;
  document.getElementById('edit-todo-text').value=data.text;
  document.getElementById('edit-todo-priority').value=data.priority||'medium';
  initTimeSelects('edit-todo-start','edit-todo-end');
  document.getElementById('edit-todo-start').value=data.start_time||'';
  document.getElementById('edit-todo-end').value=data.end_time||'';
  document.getElementById('edit-modal').style.display='flex';
}

async function saveTodoEdit(){
  const id=document.getElementById('edit-todo-id').value;
  const text=document.getElementById('edit-todo-text').value.trim();
  const priority=document.getElementById('edit-todo-priority').value;
  const start_time=document.getElementById('edit-todo-start').value||null;
  const end_time=document.getElementById('edit-todo-end').value||null;
  if(!text){showToast('⚠️ 내용을 입력해주세요');return;}
  await sb.from('todos').update({text,priority,start_time,end_time}).eq('id',id);
  closeEditModal(); await loadTodos(); showToast('✅ 수정됐어요!');
}

function closeEditModal(){document.getElementById('edit-modal').style.display='none';}
document.addEventListener('click',e=>{if(e.target.id==='edit-modal')closeEditModal();});

async function loadHistory(){
  const filter=document.getElementById('history-filter')?.value||'month';
  const el=document.getElementById('todo-history');
  const{data}=await sb.from('todos').select('*').eq('user_id',currentUser.id).eq('done',true).order('done_at',{ascending:false});
  if(!data||!data.length){el.innerHTML='<div class="empty">완료된 할일이 없습니다</div>';return;}
  const days=['일','월','화','수','목','금','토'];
  if(filter==='month'){
    const groups={};
    data.forEach(t=>{const[y,m]=t.date.split('-');const key=`${y}-${m}`;if(!groups[key])groups[key]={year:y,month:m,items:[]};groups[key].items.push(t);});
    el.innerHTML=Object.entries(groups).sort(([a],[b])=>b.localeCompare(a)).map(([key,g])=>{
      const dayGroups={};
      g.items.forEach(t=>{if(!dayGroups[t.date])dayGroups[t.date]=[];dayGroups[t.date].push(t);});
      const daysHTML=Object.entries(dayGroups).sort(([a],[b])=>b.localeCompare(a)).map(([date,items])=>{
        const[y,m,d]=date.split('-');const dow=days[new Date(date).getDay()];
        return `<div class="history-day"><div class="history-day-title">📅 ${d}일 (${dow}) — ${items.length}건</div>
          ${items.map(t=>{const p=PRIORITY[t.priority||'medium'];const timeStr=t.start_time?`⏰ ${t.start_time}${t.end_time?' ~ '+t.end_time:''}` :'';
          return `<div class="history-item"><span style="color:${p.color};font-size:.8rem">${p.label.split(' ')[0]}</span><span class="history-text">${t.text}</span><span class="history-time">${timeStr} ${formatDoneTime(t.done_at)}</span></div>`;}).join('')}
        </div>`;
      }).join('');
      return `<div class="history-month"><div class="history-month-title" onclick="toggleHistoryMonth('${key}')">📆 ${g.year}년 ${g.month}월<span class="history-count">${g.items.length}건 완료</span><span class="history-arrow" id="arrow-${key}">▼</span></div><div class="history-month-body" id="month-${key}">${daysHTML}</div></div>`;
    }).join('');
  } else {
    const groups={};
    data.forEach(t=>{if(!groups[t.date])groups[t.date]=[];groups[t.date].push(t);});
    el.innerHTML=Object.entries(groups).sort(([a],[b])=>b.localeCompare(a)).map(([date,items])=>{
      const[y,m,d]=date.split('-');const dow=days[new Date(date).getDay()];
      return `<div class="history-day" style="margin-bottom:.8rem"><div class="history-day-title">📅 ${y}년 ${m}월 ${d}일 (${dow}) — ${items.length}건</div>
        ${items.map(t=>{const p=PRIORITY[t.priority||'medium'];const timeStr=t.start_time?`⏰ ${t.start_time}${t.end_time?' ~ '+t.end_time:''}` :'';
        return `<div class="history-item"><span style="color:${p.color};font-size:.8rem">${p.label.split(' ')[0]}</span><span class="history-text">${t.text}</span><span class="history-time">${timeStr} ${formatDoneTime(t.done_at)}</span></div>`;}).join('')}
      </div>`;
    }).join('');
  }
}

function toggleHistoryMonth(key){
  const body=document.getElementById(`month-${key}`),arrow=document.getElementById(`arrow-${key}`);
  if(!body) return;
  const isHidden=body.style.display==='none';
  body.style.display=isHidden?'block':'none';
  if(arrow) arrow.textContent=isHidden?'▼':'▶';
}

function formatDoneTime(isoStr){
  if(!isoStr) return '';
  const d=new Date(isoStr);
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

// ===== 구글 캘린더 =====
function showGcalSetup(){
  document.getElementById('gcal-setup').style.display='block';
  document.getElementById('gcal-list').style.display='none';
  const key=localStorage.getItem('gcal_api_key')||'';
  const id=localStorage.getItem('gcal_cal_id')||'';
  if(key) document.getElementById('gcal-api-key').value=key;
  if(id) document.getElementById('gcal-cal-id').value=id;
}

function saveGcalSettings(){
  const key=document.getElementById('gcal-api-key').value.trim();
  const id=document.getElementById('gcal-cal-id').value.trim();
  if(!key||!id){showToast('⚠️ API 키와 캘린더 ID를 입력해주세요');return;}
  localStorage.setItem('gcal_api_key',key);
  localStorage.setItem('gcal_cal_id',id);
  document.getElementById('gcal-setup').style.display='none';
  document.getElementById('gcal-list').style.display='block';
  showToast('✅ 저장됐어요!');
  loadGcal();
}

async function loadGcal(){
  const apiKey=localStorage.getItem('gcal_api_key');
  const calId=localStorage.getItem('gcal_cal_id');
  const el=document.getElementById('gcal-list');
  if(!apiKey||!calId) return;
  el.innerHTML='<div class="empty">불러오는 중...</div>';
  const dateVal=document.getElementById('todo-date')?.value; if(!dateVal) return;
  const timeMin=`${dateVal}T00:00:00Z`,timeMax=`${dateVal}T23:59:59Z`;
  const url=`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(calId)}/events?key=${apiKey}&timeMin=${timeMin}&timeMax=${timeMax}&singleEvents=true&orderBy=startTime`;
  try{
    const res=await fetch(url);
    if(!res.ok){el.innerHTML=`<div class="empty" style="color:var(--danger)">⚠️ 불러오기 실패.<br><button class="btn btn-outline btn-sm" style="margin-top:.5rem" onclick="showGcalSetup()">설정 변경</button></div>`;return;}
    const data=await res.json();
    if(!data.items||!data.items.length){el.innerHTML='<div class="empty">오늘 일정이 없습니다</div>';return;}
    el.innerHTML=data.items.map(ev=>{
      const start=ev.start.dateTime?new Date(ev.start.dateTime):null;
      const end=ev.end.dateTime?new Date(ev.end.dateTime):null;
      const timeStr=start?`${String(start.getHours()).padStart(2,'0')}:${String(start.getMinutes()).padStart(2,'0')} ~ ${String(end.getHours()).padStart(2,'0')}:${String(end.getMinutes()).padStart(2,'0')}`:'종일';
      return `<div class="gcal-item"><div class="gcal-time">${timeStr}</div><div class="gcal-title">${ev.summary||'(제목 없음)'}</div>${ev.description?`<div class="gcal-desc">${ev.description}</div>`:''}</div>`;
    }).join('');
  }catch(e){el.innerHTML=`<div class="empty" style="color:var(--danger)">⚠️ 오류: ${e.message}</div>`;}
}
</script>

<div class="container">
  <!-- 입력 -->
  <div class="card">
    <h2>할일 추가</h2>
    <div class="form-group">
      <label>날짜</label>
      <input type="date" id="todo-date" onchange="loadTodos();loadGcal();">
    </div>
    <div class="form-row" style="flex-wrap:wrap">
      <div class="form-group" style="flex:1;min-width:calc(50% - .3rem)">
        <label>시작 시간</label>
        <select id="todo-start"><option value="">선택</option></select>
      </div>
      <div class="form-group" style="flex:1;min-width:calc(50% - .3rem)">
        <label>종료 시간</label>
        <select id="todo-end"><option value="">선택</option></select>
      </div>
    </div>
    <div class="form-group">
      <label>할일 내용</label>
      <textarea id="todo-input" placeholder="할일을 입력하세요&#10;(Shift+Enter로 줄바꿈)" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();addTodo();}" style="min-height:48px;max-height:120px;resize:none;overflow-y:auto;line-height:1.5;" oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
    </div>
    <div class="form-group">
      <label>우선순위</label>
      <select id="todo-priority">
        <option value="high">🔴 높음</option>
        <option value="medium" selected>🟡 보통</option>
        <option value="low">🟢 낮음</option>
      </select>
    </div>
    <button class="btn btn-primary" onclick="addTodo()">+ 할일 추가</button>
  </div>

  <!-- 오늘 할일 -->
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
      <h2 style="margin:0" id="todo-date-label">오늘 할일</h2>
      <span id="todo-stats" style="font-size:.75rem;color:var(--text-muted)"></span>
    </div>
    <div id="todo-list"><div class="empty">할일이 없습니다</div></div>
  </div>

  <!-- 구글 캘린더 -->
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
      <h2 style="margin:0">📅 구글 캘린더</h2>
      <button class="btn btn-outline btn-sm" onclick="loadGcal()">새로고침</button>
    </div>
    <div id="gcal-setup" style="display:none">
      <div class="form-group"><label>API 키</label><input type="text" id="gcal-api-key" placeholder="Google API Key"></div>
      <div class="form-group"><label>캘린더 ID</label><input type="text" id="gcal-cal-id" placeholder="example@gmail.com"></div>
      <button class="btn btn-primary" onclick="saveGcalSettings()">저장 및 연결</button>
    </div>
    <div id="gcal-list"><div class="empty" style="font-size:.82rem">
      <div style="margin-bottom:.8rem">구글 캘린더를 연동하면 오늘 일정이 표시돼요</div>
      <button class="btn btn-outline btn-sm" onclick="showGcalSetup()">🔗 캘린더 연동하기</button>
    </div></div>
  </div>

  <!-- 히스토리 -->
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
      <h2 style="margin:0">📊 완료 히스토리</h2>
      <select id="history-filter" onchange="loadHistory()" style="width:auto;padding:.3rem .6rem;font-size:.8rem">
        <option value="month">월별</option>
        <option value="day">일별</option>
      </select>
    </div>
    <div id="todo-history"><div class="empty">완료된 할일이 없습니다</div></div>
  </div>
</div>
</body>
</html>
