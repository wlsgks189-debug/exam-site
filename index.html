<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>자료실 — 짱구's Desk</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="짱구's Desk">
<meta name="theme-color" content="#0d1117">
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="common.js"></script>
</head>
<body>
<div id="main-section" style="display:none">
  <div class="container">
    <div class="filter-bar">
      <select id="filter-type" onchange="applyFilter()">
        <option value="">전체 종류</option>
        <option value="정기">정기</option>
        <option value="단체">단체</option>
      </select>
      <select id="filter-month" onchange="applyFilter()"><option value="">전체 월</option></select>
      <label class="filter-toggle"><input type="checkbox" id="filter-hide-old" onchange="applyFilter()"> 한달 지난 파일 숨기기</label>
    </div>
    <div class="multi-bar" id="multi-bar" style="display:none">
      <span style="font-size:.85rem;color:var(--accent)" id="multi-count">0개 선택</span>
      <div style="display:flex;gap:.5rem">
        <button class="btn btn-share btn-sm" onclick="shareMultiple()">📤 선택 공유</button>
        <button class="btn btn-outline btn-sm" onclick="clearSelection()">취소</button>
      </div>
    </div>
    <div id="file-list"></div>
  </div>
</div>
<script>
let allFiles = [], fileMeta = {}, selectedFiles = new Set();
const dlCounts = JSON.parse(localStorage.getItem('dlCounts') || '{}');

window.addEventListener('DOMContentLoaded', () => {
  initPage(() => {
    const fm = document.getElementById('filter-month');
    for (let i = 1; i <= 12; i++) {
      const v = String(i).padStart(2, '0');
      fm.innerHTML += `<option value="${v}">${v}월</option>`;
    }
    loadFiles();
  });
});

async function loadFiles() {
  const { data } = await sb.storage.from('exam-zips').list('', { sortBy: { column: 'created_at', order: 'desc' } });
  allFiles = (data || []).filter(f => f.name.endsWith('.zip'));
  const { data: meta } = await sb.from('file_meta').select('*');
  fileMeta = {};
  (meta || []).forEach(m => fileMeta[m.filename] = m);
  applyFilter();
}

function applyFilter() {
  const type = document.getElementById('filter-type').value;
  const month = document.getElementById('filter-month').value;
  const hideOld = document.getElementById('filter-hide-old').checked;
  let filtered = allFiles;
  if (type) filtered = filtered.filter(f => fileMeta[f.name]?.type === type);
  if (month) filtered = filtered.filter(f => fileMeta[f.name]?.month === month);
  if (hideOld) filtered = filtered.filter(f => {
    const m = fileMeta[f.name];
    if (!m) return false;
    const d = new Date(`${m.year}-${m.month}-${m.day}`);
    const ago = new Date(); ago.setMonth(ago.getMonth() - 1);
    return d >= ago;
  });
  renderFiles(filtered);
}

function groupFiles(files) {
  const groups = {};
  files.forEach(f => {
    const meta = fileMeta[f.name];
    if (!meta) { const k = `z_${f.name}`; if (!groups[k]) groups[k] = { meta: null, files: [] }; groups[k].files.push({ ...f, meta: null }); return; }
    const k = `${meta.year}-${meta.month}-${meta.day}_${meta.type}`;
    if (!groups[k]) groups[k] = { meta, files: [] };
    groups[k].files.push({ ...f, meta });
  });
  return Object.values(groups).sort((a, b) => {
    if (!a.meta) return 1; if (!b.meta) return -1;
    return `${b.meta.year}${b.meta.month}${b.meta.day}`.localeCompare(`${a.meta.year}${a.meta.month}${a.meta.day}`);
  });
}

function renderFiles(files) {
  const groups = groupFiles(files);
  const isAdmin = currentRole === 'admin';
  const el = document.getElementById('file-list');
  if (!groups.length) { el.innerHTML = '<div class="empty">파일이 없습니다</div>'; return; }
  el.innerHTML = groups.map(g => {
    const m = g.meta;
    const typeCls = m?.type === '정기' ? 'type-regular' : 'type-group';
    const header = m
      ? `<div class="date-group-header"><div class="date-group-title">📅 ${m.year}년 ${m.month}월 ${m.day}일 (${m.day_of_week || ''})</div><span class="exam-type-badge ${typeCls}">${m.type}</span></div>`
      : `<div class="date-group-header"><div class="date-group-title">📁 기타 파일</div></div>`;
    const items = g.files.map(f => {
      const name = f.name.replace(/\.zip$/i, '');
      const dl = dlCounts[f.name] || 0;
      const memo = f.meta?.memo || '';
      return `<div class="file-item">
        <input type="checkbox" class="file-check" onchange="toggleSelect('${f.name}')">
        <div class="file-info"><div class="file-icon">📦</div>
          <div style="min-width:0"><div class="file-name">${name}</div>
            <div class="file-meta"><span class="file-size">${formatSize(f.metadata?.size)}</span>${memo ? `<span class="file-memo">📝 ${memo}</span>` : ''}<span class="file-dl-count">⬇ ${dl}회</span></div>
          </div>
        </div>
        <div class="file-actions">
          <button class="btn btn-success btn-sm" onclick="downloadFile('${f.name}')">⬇ 다운로드</button>
          <button class="btn btn-share btn-sm" onclick="shareFile('${f.name}')">📤 공유</button>
          ${isAdmin ? `<button class="btn btn-danger btn-sm" onclick="deleteFile('${f.name}')">🗑</button>` : ''}
        </div>
      </div>`;
    }).join('');
    return `<div class="date-group">${header}${items}</div>`;
  }).join('');
}

function toggleSelect(name) {
  if (selectedFiles.has(name)) selectedFiles.delete(name); else selectedFiles.add(name);
  const cnt = selectedFiles.size;
  document.getElementById('multi-bar').style.display = cnt > 0 ? 'flex' : 'none';
  document.getElementById('multi-count').textContent = `${cnt}개 선택`;
}
function clearSelection() {
  selectedFiles.clear();
  document.querySelectorAll('.file-check').forEach(c => c.checked = false);
  document.getElementById('multi-bar').style.display = 'none';
}
async function shareMultiple() {
  if (!selectedFiles.size) return;
  showToast('⏳ 파일 준비 중...');
  try {
    const files = [];
    for (const name of selectedFiles) {
      const { data } = await sb.storage.from('exam-zips').download(name);
      if (data) files.push(new File([data], name, { type: 'application/zip' }));
    }
    if (navigator.share && navigator.canShare && navigator.canShare({ files })) await navigator.share({ files });
    else showToast('⚠️ 다중 파일 공유를 지원하지 않습니다');
  } catch (e) { if (e.name !== 'AbortError') showToast('공유 실패'); }
  clearSelection();
}
async function downloadFile(name) {
  const { data } = await sb.storage.from('exam-zips').download(name);
  if (!data) return;
  dlCounts[name] = (dlCounts[name] || 0) + 1;
  localStorage.setItem('dlCounts', JSON.stringify(dlCounts));
  const url = URL.createObjectURL(data);
  const a = document.createElement('a'); a.href = url; a.download = name; a.click();
  URL.revokeObjectURL(url);
  applyFilter();
}
async function shareFile(name) {
  try {
    const { data } = await sb.storage.from('exam-zips').download(name);
    if (!data) return;
    const file = new File([data], name, { type: 'application/zip' });
    if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) await navigator.share({ files: [file] });
    else downloadFile(name);
  } catch (e) { if (e.name !== 'AbortError') downloadFile(name); }
}
async function deleteFile(name) {
  if (!confirm('삭제할까요?')) return;
  await sb.storage.from('exam-zips').remove([name]);
  await sb.from('file_meta').delete().eq('filename', name);
  loadFiles();
}
</script>
</body>
</html>
